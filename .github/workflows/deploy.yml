name: Deploy to Wasmer Edge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wasmer-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Wasmer CLI
        run: |
          curl -sSfL https://get.wasmer.io | sh
          echo "$HOME/.wasmer/bin" >> "$GITHUB_PATH"

      - name: Verify Wasmer CLI
        run: wasmer --version

      - name: Create .env for deployment
        run: |
          cat > .env <<'ENDOFENV'
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_SSL=true
          ENDOFENV
          sed -i 's/^[[:space:]]*//' .env

      - name: Deploy to Wasmer Edge
        env:
          WASMER_TOKEN: ${{ secrets.WASMER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${WASMER_TOKEN:-}" ]; then
            echo "Missing WASMER_TOKEN secret"
            exit 1
          fi

          if wasmer deploy --help | grep -q -- "--token"; then
            wasmer deploy --non-interactive --token "$WASMER_TOKEN"
          else
            wasmer login "$WASMER_TOKEN"
            wasmer deploy --non-interactive
          fi
